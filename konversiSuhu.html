<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Konversi Suhu</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f8ff;
      text-align: center;
      padding: 40px;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, select, button {
      margin: 10px 0;
      padding: 8px;
      width: 90%;
    }

    .result {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
    }

    .cToF {
      color: blue;
    }

    .fToC {
      color: green;
    }

    .formula {
      margin-top: 15px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Konversi Suhu</h2>

  <input type="number" id="inputSuhu" placeholder="Masukkan suhu">

  <select id="tipeKonversi">
    <option value="CtoF">Celsius → Fahrenheit</option>
    <option value="FtoC">Fahrenheit → Celsius</option>
  </select>

  <button onclick="konversi()">Konversi</button>

  <div id="hasil" class="result"></div>
  <div id="rumus" class="formula"></div>
</div>

<script>
function konversi() {
  let suhu = parseFloat(document.getElementById("inputSuhu").value);
  let tipe = document.getElementById("tipeKonversi").value;
  let hasil = document.getElementById("hasil");
  let rumus = document.getElementById("rumus");

  if (isNaN(suhu)) {
    hasil.innerHTML = "Masukkan angka yang valid!";
    hasil.className = "result";
    rumus.innerHTML = "";
    return;
  }

  if (tipe === "CtoF") {
    let f = (suhu * 9/5) + 32;
    hasil.innerHTML = `${suhu}°C = ${f.toFixed(2)}°F`;
    hasil.className = "result cToF";
    rumus.innerHTML = "Rumus: (°C × 9/5) + 32";
  } else {
    let c = (suhu - 32) * 5/9;
    hasil.innerHTML = `${suhu}°F = ${c.toFixed(2)}°C`;
    hasil.className = "result fToC";
    rumus.innerHTML = "Rumus: (°F − 32) × 5/9";
  }
}
</script>

</body>
</html>
