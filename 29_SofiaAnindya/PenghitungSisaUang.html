<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Penghitung Sisa Uang Belanja</title>
</head>
<body>

    <h2>Penghitung Sisa Uang Belanja</h2>

    <form onsubmit="hitung(); return false;">
        <label>Jumlah Uang:</label><br>
        <input type="number" id="uang" required><br><br>

        <label>Harga Barang 1:</label><br>
        <input type="number" id="barang1" required><br><br>

        <label>Harga Barang 2:</label><br>
        <input type="number" id="barang2" required><br><br>

        <label>Harga Barang 3:</label><br>
        <input type="number" id="barang3" required><br><br>

        <button type="submit">Hitung</button>
    </form>

    <h3 id="hasil"></h3>

    <script>
        function hitung() {
            let uang = parseInt(document.getElementById("uang").value);
            let b1 = parseInt(document.getElementById("barang1").value);
            let b2 = parseInt(document.getElementById("barang2").value);
            let b3 = parseInt(document.getElementById("barang3").value);

            let total = b1 + b2 + b3;
            let sisa = uang - total;

            if (sisa < 0) {
                document.getElementById("hasil").innerHTML = 
                    "Total Belanja: " + total + "<br>Uang tidak cukup!";
            } else {
                document.getElementById("hasil").innerHTML = 
                    "Total Belanja: " + total + "<br>Sisa Uang: " + sisa;
            }
        }
    </script>

</body>
</html>
