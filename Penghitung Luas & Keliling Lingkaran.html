<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penghitung Lingkaran</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        input, button {
            padding: 12px;
            margin: 10px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
        }
        button {
            background: #ff6b6b;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #ff5252;
        }
        .result {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 10px;
        }
        img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            margin: 20px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <h1>🌀 Penghitung Lingkaran</h1>
    
    <img src="https://images.unsplash.com/photo-1558618047-3c8c76ca3350?w=300&h=300&fit=crop&crop=center" alt="Lingkaran">
    
    <div>
        <input type="number" id="radius" placeholder="Masukkan jari-jari (r)" step="0.01">
        <br>
        <button onclick="hitung()">Hitung Luas & Keliling</button>
    </div>
    
    <div id="result" class="result" style="display:none;">
        <div>Luas = <span id="luas"></span> cm²</div>
        <div>Keliling = <span id="keliling"></span> cm</div>
    </div>

    <script>
        function hitung() {
            const r = parseFloat(document.getElementById('radius').value);
            const pi = 3.14;
            
            if (isNaN(r) || r <= 0) {
                alert('Masukkan jari-jari yang valid!');
                return;
            }
            
            const luas = pi * r * r;
            const keliling = 2 * pi * r;
            
            document.getElementById('luas').textContent = luas.toFixed(2);
            document.getElementById('keliling').textContent = keliling.toFixed(2);
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
