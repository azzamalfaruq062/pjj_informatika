<!DOCTYPE html>
<html>
<head>
    <title>Persegi Panjang</title>
</head>
<body>

<h2>Hitung Luas & Keliling Persegi Panjang</h2>

<form onsubmit="hitung(); return false;">
    Panjang: <input type="number" id="panjang" required><br><br>
    Lebar: <input type="number" id="lebar" required><br><br>
    <button type="submit">Hitung</button>
</form>

<br>

<table border="1">
    <tr>
        <th>Jenis</th>
        <th>Hasil</th>
    </tr>
    <tr>
        <td>Luas</td>
        <td id="luas"></td>
    </tr>
    <tr>
        <td>Keliling</td>
        <td id="keliling"></td>
    </tr>
</table>

<script>
function hitung() {
    let p = parseFloat(document.getElementById("panjang").value);
    let l = parseFloat(document.getElementById("lebar").value);

    let luas = p * l;
    let keliling = 2 * (p + l);

    document.getElementById("luas").innerText = luas + " cm²";
    document.getElementById("keliling").innerText = keliling + " cm";
}
</script>

</body>
</html>
