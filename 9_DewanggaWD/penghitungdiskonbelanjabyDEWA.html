<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tugas: Penghitung Diskon Belanja</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .container { max-width: 400px; margin: auto; border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        .input-group { margin-bottom: 15px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #4969f9; color: white; border: none; cursor: pointer; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; display: none; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <h3>Kalkulator Diskon</h3>
        <p><strong>Nama:</strong> Dewangga W.D.</p>
        <div class="input-group">
            <label>Harga (Rp):</label>
            <input type="number" id="harga" placeholder="Contoh: 100000">
        </div>
        <div class="input-group">
            <label>Diskon (%):</label>
            <input type="number" id="diskon" placeholder="Contoh: 10">
        </div>
        <button onclick="hitung()">Hitung</button>
        <table id="hasilTabel">
            <tr><td>Harga Awal</td><td id="tHarga"></td></tr>
            <tr><td>Diskon</td><td id="tDiskon"></td></tr>
            <tr><td><strong>Total Bayar</strong></td><td id="tTotal"></td></tr>
        </table>
    </div>
    <script>
        function hitung() {
            let harga = parseFloat(document.getElementById('harga').value);
            let diskon = parseFloat(document.getElementById('diskon').value);
            if (isNaN(harga) || isNaN(diskon)) return alert("Isi input dengan benar");
            
            let jmlDiskon = (diskon / 100) * harga;
            let total = harga - jmlDiskon;
            
            document.getElementById('tHarga').innerText = "Rp " + harga.toLocaleString('id-ID');
            document.getElementById('tDiskon').innerText = "Rp " + jmlDiskon.toLocaleString('id-ID');
            document.getElementById('tTotal').innerText = "Rp " + total.toLocaleString('id-ID');
            document.getElementById('hasilTabel').style.display = 'table';
        }
    </script>
</body>
</html>
