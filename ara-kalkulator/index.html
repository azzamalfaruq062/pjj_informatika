<!doctype html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalkulator Sains & Math SMP 8</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="kalkulator">
        <div class="header">
            <span>SAINS & MATH TOOL</span>
            <small>SMP Kelas 8</small>
        </div>
        
        <input type="text" id="display" placeholder="0" readonly />

        <div class="grid-container">
            <!-- BARIS RUMUS KHUSUS -->
            <button class="btn formula" onclick="calcGradient()">Gradien</button>
            <button class="btn formula" onclick="calcMean()">Mean</button>
            <button class="btn formula" onclick="calcForce()">Gaya (F)</button>
            <button class="btn formula" onclick="calcMirror()">Cermin</button>
            
            <button class="btn clear span-3" onclick="clearDisplay()">RESET</button>

            <!-- ANGKA & OPERATOR -->
            <button class="btn num" onclick="append('7')">7</button>
            <button class="btn num" onclick="append('8')">8</button>
            <button class="btn num" onclick="append('9')">9</button>
            <button class="btn operator" onclick="append('/')">÷</button>

            <button class="btn num" onclick="append('4')">4</button>
            <button class="btn num" onclick="append('5')">5</button>
            <button class="btn num" onclick="append('6')">6</button>
            <button class="btn operator" onclick="append('*')">×</button>

            <button class="btn num" onclick="append('1')">1</button>
            <button class="btn num" onclick="append('2')">2</button>
            <button class="btn num" onclick="append('3')">3</button>
            <button class="btn operator" onclick="append('-')">-</button>

            <button class="btn num" onclick="append('0')">0</button>
            <button class="btn num" onclick="append('.')">.</button>
            <button class="btn equal" onclick="calculate()">=</button>
            <button class="btn operator" onclick="append('+')">+</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
