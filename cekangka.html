<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Cek Angka Terbesar & Terkecil</title>
</head>
<body>

<h2>Cek Angka Terbesar dan Terkecil (3 Angka)</h2>

<form onsubmit="hitung(); return false;">
    <label>Angka 1:</label>
    <input type="number" id="a" required><br><br>

    <label>Angka 2:</label>
    <input type="number" id="b" required><br><br>

    <label>Angka 3:</label>
    <input type="number" id="c" required><br><br>

    <button type="submit">Hitung</button>
</form>

<h3>Hasil:</h3>
<p id="hasil"></p>

<script>
function hitung() {
    let a = parseFloat(document.getElementById("a").value);
    let b = parseFloat(document.getElementById("b").value);
    let c = parseFloat(document.getElementById("c").value);

    // Cari terbesar dan terkecil
    let terbesar = Math.max(a, b, c);
    let terkecil = Math.min(a, b, c);

    // Urutkan angka
    let angka = [a, b, c];
    angka.sort(function(x, y) {
        return x - y;
    });

    document.getElementById("hasil").innerHTML =
        "Angka Terbesar: " + terbesar + "<br>" +
        "Angka Terkecil: " + terkecil + "<br>" +
        "Urutan: " + angka.join(", ");
}
</script>

</body>
</html>
